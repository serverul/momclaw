name: Google Play Deploy

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Deployment track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version:
        description: 'Version to deploy (leave empty for latest tag)'
        required: false

jobs:
  deploy:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > MOMCLAW-release-key.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../MOMCLAW-release-key.jks
          EOF

      - name: Setup Play Store credentials
        env:
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          echo "$PLAY_STORE_SERVICE_ACCOUNT" > play-store-service-account.json

      - name: Install Fastlane
        run: |
          cd android
          bundle install

      - name: Get Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      - name: Deploy to Google Play
        env:
          TRACK: ${{ github.event.inputs.track }}
        run: |
          cd android
          case "$TRACK" in
            internal)
              bundle exec fastlane deploy_internal
              ;;
            alpha)
              bundle exec fastlane deploy_alpha
              ;;
            beta)
              bundle exec fastlane deploy_beta
              ;;
            production)
              bundle exec fastlane deploy_production
              ;;
          esac

      - name: Upload Build Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports
          path: android/app/build/reports/
          retention-days: 7

      - name: Notify Success
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TRACK="${{ github.event.inputs.track }}"
          echo "✅ Successfully deployed MomClAW v${VERSION} to ${TRACK} track"

      - name: Notify Discord
        if: success() && env.DISCORD_WEBHOOK_ID != ''
        env:
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TRACK="${{ github.event.inputs.track }}"
          curl -X POST "https://discord.com/api/webhooks/${DISCORD_WEBHOOK_ID}/${DISCORD_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"MomClAW Deployed to Google Play\",
                \"description\": \"Version v${VERSION} deployed to ${TRACK} track\",
                \"color\": 65280,
                \"fields\": [
                  {\"name\": \"Version\", \"value\": \"v${VERSION}\", \"inline\": true},
                  {\"name\": \"Track\", \"value\": \"${TRACK}\", \"inline\": true}
                ]
              }]
            }"
