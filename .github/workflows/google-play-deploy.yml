name: Deploy to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: 'internal'
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    
    - name: Install Fastlane
      run: gem install fastlane
    
    - name: Make gradlew executable
      run: chmod +x android/gradlew
    
    - name: Decode Google Play Service Account
      env:
        GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
      run: |
        echo "$GOOGLE_PLAY_SERVICE_ACCOUNT" > android/google-play-service-account.json
    
    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 -d > momclaw-release-key.jks
    
    - name: Create key.properties
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        cat > android/key.properties << EOF
        storePassword=$STORE_PASSWORD
        keyPassword=$KEY_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=../momclaw-release-key.jks
        EOF
    
    - name: Update version
      run: |
        VERSION_CODE=$(echo ${{ github.event.inputs.version }} | tr -d '.')
        sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" android/app/build.gradle.kts
        sed -i "s/versionName = .*/versionName = \"${{ github.event.inputs.version }}\"/" android/app/build.gradle.kts
    
    - name: Build Release AAB
      run: |
        ./android/gradlew clean bundleRelease
    
    - name: Deploy to Google Play
      run: |
        cd android
        fastlane ${{ github.event.inputs.track }}
    
    - name: Notify Success
      if: success()
      run: |
        echo "✅ Deployed v${{ github.event.inputs.version }} to ${{ github.event.inputs.track }} track"
        echo "Check: https://play.google.com/console"
    
    - name: Cleanup
      if: always()
      run: |
        rm -f android/google-play-service-account.json
        rm -f momclaw-release-key.jks
        rm -f android/key.properties
