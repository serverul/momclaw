name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > MOMCLAW-release-key.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../MOMCLAW-release-key.jks
          EOF

      - name: Grant execute permission
        run: chmod +x android/gradlew scripts/*.sh

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      - name: Sign APK
        run: |
          cd android/app/build/outputs/apk/release
          for apk in app-*-release-unsigned.apk; do
            signed_apk="${apk/-unsigned/}"
            $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
              --ks ../../../MOMCLAW-release-key.jks \
              --ks-pass pass:${{ secrets.STORE_PASSWORD }} \
              --key-pass pass:${{ secrets.KEY_PASSWORD }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --out "$signed_apk" \
              "$apk"
          done

      - name: Verify Signature
        run: |
          cd android/app/build/outputs/apk/release
          for apk in app-*-release.apk; do
            echo "Verifying $apk..."
            $ANDROID_HOME/build-tools/35.0.0/apksigner verify -v "$apk"
          done

      - name: Rename Artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd android/app/build/outputs
          
          # Rename APKs
          cd apk/release
          for apk in app-*-release.apk; do
            abi=$(echo "$apk" | sed 's/app-\(.*\)-release.apk/\1/')
            mv "$apk" "MOMCLAW-${VERSION}-${abi}.apk"
          done
          
          # Rename AAB
          cd ../../bundle/release
          mv app-release.aab "MOMCLAW-${VERSION}.aab"

      - name: Generate Checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd android/app/build/outputs
          
          echo "# SHA256 Checksums" > checksums.txt
          echo "" >> checksums.txt
          
          for apk in apk/release/*.apk; do
            sha256sum "$apk" >> checksums.txt
          done
          sha256sum bundle/release/MOMCLAW-${VERSION}.aab >> checksums.txt
          
          cat checksums.txt

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: android/app/build/outputs/checksums.txt
          retention-days: 30

  github-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Release Notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract changelog for this version
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            # Get content between this version and the next
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
          else
            echo "Release version $VERSION" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MomClAW v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            artifacts/release-apks/*.apk
            artifacts/release-aab/*.aab
            artifacts/checksums/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: [build-release, github-release]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_ID != '' && env.DISCORD_WEBHOOK_TOKEN != ''
        env:
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -X POST "https://discord.com/api/webhooks/${DISCORD_WEBHOOK_ID}/${DISCORD_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"MomClAW v${VERSION} Released!\",
                \"description\": \"A new version of MomClAW is now available.\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"Version\", \"value\": \"v${VERSION}\", \"inline\": true},
                  {\"name\": \"Release\", \"value\": \"[GitHub](https://github.com/serverul/MOMCLAW/releases/tag/v${VERSION})\", \"inline\": true}
                ]
              }]
            }"
