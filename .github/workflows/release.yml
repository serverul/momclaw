name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Make gradlew executable
      run: chmod +x android/gradlew
    
    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $ENCODED_KEYSTORE | base64 -d > android/momclaw-release-key.jks
    
    - name: Create key.properties
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        cat > android/key.properties << EOF
        storePassword=$STORE_PASSWORD
        keyPassword=$KEY_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=../momclaw-release-key.jks
        EOF
    
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi
    
    - name: Build Release APK
      run: |
        ./android/gradlew assembleRelease \
          -PversionName=${{ steps.get_version.outputs.VERSION }} \
          -PversionCode=${{ github.run_number }}
    
    - name: Build Release AAB
      run: |
        ./android/gradlew bundleRelease \
          -PversionName=${{ steps.get_version.outputs.VERSION }} \
          -PversionCode=${{ github.run_number }}
    
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"
    
    - name: Verify signature
      run: |
        jarsigner -verify -verbose -certs \
          android/app/build/outputs/apk/release/app-release.apk
    
    - name: Rename artifacts
      run: |
        mv android/app/build/outputs/apk/release/app-release.apk \
           momclaw-${{ steps.get_version.outputs.VERSION }}.apk
        mv android/app/build/outputs/bundle/release/app-release.aab \
           momclaw-${{ steps.get_version.outputs.VERSION }}.aab
    
    - name: Generate changelog
      id: changelog
      run: |
        # Get previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -n "$PREV_TAG" ]; then
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "CHANGELOG=Initial release" >> $GITHUB_OUTPUT
        fi
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: MomClaw v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## MomClaw v${{ steps.get_version.outputs.VERSION }}
          
          ### 🚀 Changes
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ### 📦 Downloads
          - **APK**: `momclaw-${{ steps.get_version.outputs.VERSION }}.apk`
          - **AAB**: `momclaw-${{ steps.get_version.outputs.VERSION }}.aab`
          
          ### 📋 System Requirements
          - Android 9.0 (API 28) or higher
          - 4GB+ RAM recommended
          - 3GB+ free storage for model
          
          ### 🔧 Installation
          1. Download the APK
          2. Enable "Install from unknown sources" in settings
          3. Install the APK
          4. Download the model using in-app downloader
          
          Full documentation: [DOCUMENTATION.md](DOCUMENTATION.md)
        files: |
          momclaw-${{ steps.get_version.outputs.VERSION }}.apk
          momclaw-${{ steps.get_version.outputs.VERSION }}.aab
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-rc') || contains(steps.get_version.outputs.VERSION, '-beta') || contains(steps.get_version.outputs.VERSION, '-alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to Google Play (optional)
      if: github.event_name == 'push' && !contains(steps.get_version.outputs.VERSION, '-rc') && !contains(steps.get_version.outputs.VERSION, '-beta') && !contains(steps.get_version.outputs.VERSION, '-alpha')
      run: |
        echo "TODO: Implement Google Play upload using fastlane or Play Publisher plugin"
        # Requires additional setup with Google Play Console API
    
    - name: Cleanup
      if: always()
      run: |
        rm -f android/momclaw-release-key.jks
        rm -f android/key.properties

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Notify Discord
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        message: |
          🚀 **MomClaw v${{ needs.build.outputs.version }} Released!**
          
          📦 Downloads: https://github.com/serverul/momclaw/releases/tag/v${{ needs.build.outputs.version }}
