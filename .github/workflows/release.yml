# MOMCLAW Release Workflow
# Triggered on version tags (v*)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build-signed-release:
    name: Build Signed Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
      
      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace
      
      - name: Build Signed Release AAB
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace
      
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Rename Artifacts
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          cp android/app/build/outputs/apk/release/app-release.apk \
             momclaw-${VERSION}.apk
          cp android/app/build/outputs/bundle/release/app-release.aab \
             momclaw-${VERSION}.aab
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: momclaw-apk
          path: momclaw-*.apk
      
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: momclaw-aab
          path: momclaw-*.aab

  github-release:
    name: Create GitHub Release
    needs: build-signed-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: momclaw-apk
      
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: momclaw-aab
      
      - name: Extract Changelog
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Extract changelog for this version from CHANGELOG.md
          sed -n "/^## \[${VERSION#v}\]/,/^## \[/p" CHANGELOG.md | \
            sed '1d;$d' > release_notes.md
          echo "RELEASE_NOTES=release_notes.md" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            momclaw-*.apk
            momclaw-*.aab
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-internal:
    name: Deploy to Google Play Internal
    needs: build-signed-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install --gemfile android/Gemfile
      
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: momclaw-aab
      
      - name: Deploy to Internal Track
        env:
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          cd android
          bundle exec fastlane internal

  notify:
    name: Notify Release
    needs: [github-release, deploy-internal]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "MomClAW ${{ steps.get_version.outputs.VERSION }}"
          description: |
            New release published! 🎉
            
            **APK**: Available on [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
            **Google Play**: Internal Testing Track
            
            **Changes**: See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          color: 0x00ff00
          username: "MomClAW Release Bot"
