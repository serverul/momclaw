# MOMCLAW Continuous Integration
# Runs on every push and pull request

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Run Lint
        run: cd android && ./gradlew lintDebug --stacktrace
      
      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-results
          path: android/app/build/reports/lint-results-debug.html

  detekt:
    name: Detekt Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Run Detekt
        run: cd android && ./gradlew detekt --stacktrace
      
      - name: Upload Detekt Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-results
          path: android/build/reports/detekt/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Run Unit Tests
        run: cd android && ./gradlew testDebugUnitTest --stacktrace
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            android/app/build/reports/tests/
            android/bridge/build/reports/tests/
            android/agent/build/reports/tests/
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: android/app/build/reports/coverage/

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, detekt, unit-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build Release APK (Unsigned)
    runs-on: ubuntu-latest
    needs: [lint, detekt, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Build Release APK (Unsigned)
        run: cd android && ./gradlew assembleRelease --stacktrace
      
      - name: Upload Release APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-unsigned
          path: android/app/build/outputs/apk/release/*.apk
