# MOMCLAW Google Play Store Deployment
# Manual workflow for deploying to different tracks

name: Deploy to Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Target track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      version:
        description: 'Version to deploy (e.g., 1.0.0)'
        required: false
        type: string

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install --gemfile android/Gemfile
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
      
      - name: Build Release AAB
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd android
          bundle exec fastlane build_aab
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/*.aab

  deploy:
    name: Deploy to ${{ github.event.inputs.track }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install --gemfile android/Gemfile
      
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
      
      - name: Deploy to ${{ github.event.inputs.track }}
        env:
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          cd android
          bundle exec fastlane ${{ github.event.inputs.track }}

  notify:
    name: Notify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "MomClAW Deployed to ${{ github.event.inputs.track }}"
          description: |
            Successfully deployed to **${{ github.event.inputs.track }}** track! 🚀
            
            **Track**: ${{ github.event.inputs.track }}
            **Version**: ${{ github.event.inputs.version || 'from branch' }}
            **Actor**: ${{ github.actor }}
          color: 0x00ff00
          username: "MomClAW Deploy Bot"
