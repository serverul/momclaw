name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        api-level: [28, 35]
        build-type: [debug, release]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build with Gradle
      run: |
        if [ "${{ matrix.build-type }}" = "debug" ]; then
          ./android/gradlew assembleDebug -Pandroid.targetSdkVersion=${{ matrix.api-level }}
        else
          ./android/gradlew assembleRelease -Pandroid.targetSdkVersion=${{ matrix.api-level }}
        fi
      
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MOMCLAW-${{ matrix.build-type }}-api${{ matrix.api-level }}
        path: android/app/build/outputs/apk/${{ matrix.build-type }}/*.apk
        
    - name: Upload AAB
      if: matrix.build-type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: MOMCLAW-release-api${{ matrix.api-level }}
        path: android/app/build/outputs/bundle/release/*.aab

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Run Unit Tests
      run: ./android/gradlew testDebugUnitTest
      
    - name: Run Instrumented Tests (Emulator)
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 35
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-window -no-audio -no-boot-anim
        script: ./android/gradlew connectedAndroidTest

  lint:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Run Detekt
      run: ./android/gradlew detekt
      
    - name: Run Lint
      run: ./android/gradlew lint

  release:
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build Release AAB
      run: ./android/gradlew bundleRelease
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: android/app/build/outputs/bundle/release/*.aab
        generate_release_notes: true