name: Dependabot Auto Merge

on:
  pull_request:
    branches: [ main, develop ]
    types:
      - opened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge approved dependencies
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check dependency updates
        run: |
          # Get PR labels
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels)
          echo "Labels: $LABELS"
          
          # Check for security label
          if echo "$LABELS" | grep -q '"security"'; then
            echo "✅ Security update detected, auto-merging"
            gh pr merge --auto --delete-branch
          else
            echo "Not a security update, manual review required"
          fi

      - name: Enable auto-merge for specific dependencies
        run: |
          # Auto-merge patch updates for trusted dependencies
          DEPENDENCIES="kotlin,androidx,compose,ktor,okhttp,room,hilt,dagger"
          
          for dep in $DEPENDENCIES; do
            if echo "${{ github.event.pull_request.title }}" | grep -q "$dep"; then
              echo "✅ Trusted dependency update ($dep), auto-merging"
              gh pr merge --auto --delete-branch
              exit 0
            fi
          done
          
          echo "Dependency update requires manual review"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: auto-merge
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# 🤖 Dependabot Auto-Merge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-merge | ${{ needs.auto-merge.result }} |" >> $GITHUB_STEP_SUMMARY
