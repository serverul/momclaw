# MOMCLAW F-Droid Build
# Builds APK for F-Droid distribution (FOSS only)

name: F-Droid Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  build-fdroid:
    name: Build F-Droid APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make Gradle executable
        run: chmod +x android/gradlew
      
      - name: Build F-Droid APK (Unsigned)
        run: |
          cd android
          # Build without proprietary dependencies
          ./gradlew assembleFdroid \
            -Pfdroid.build=true \
            --stacktrace
      
      - name: Get Version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Prepare F-Droid Metadata
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mkdir -p fdroid/metadata
          cp assets/fdroid-metadata.yml fdroid/metadata/com.loa.MOMCLAW.yml
          
          # Update version in metadata
          sed -i "s/{{VERSION}}/${VERSION#v}/g" fdroid/metadata/com.loa.MOMCLAW.yml
          sed -i "s/{{VERSION_CODE}}/$(grep -oP 'versionCode\s*=\s*\K\d+' android/app/build.gradle.kts)/g" fdroid/metadata/com.loa.MOMCLAW.yml
      
      - name: Rename APK
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          cp android/app/build/outputs/apk/fdroid/*.apk \
             momclaw-${VERSION}-fdroid.apk
      
      - name: Upload F-Droid APK
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-apk
          path: momclaw-*-fdroid.apk
      
      - name: Upload F-Droid Metadata
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-metadata
          path: fdroid/

  verify-foss:
    name: Verify FOSS Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for Non-FOSS Dependencies
        run: |
          echo "Checking for proprietary dependencies..."
          
          # Check build.gradle.kts for non-FOSS dependencies
          if grep -r "google-play-services" android/; then
            echo "❌ Found Google Play Services - not FOSS compliant"
            exit 1
          fi
          
          if grep -r "firebase" android/ --include="*.kts" | grep -v "// Firebase"; then
            echo "❌ Found Firebase - not FOSS compliant"
            exit 1
          fi
          
          # Check for proprietary binaries
          if find android/ -name "*.so" -o -name "*.aar" | grep -v "opensource"; then
            echo "⚠️ Found binary files - manual verification required"
          fi
          
          echo "✅ FOSS compliance check passed"

  create-release:
    name: Create F-Droid Release
    needs: [build-fdroid, verify-foss]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Download F-Droid APK
        uses: actions/download-artifact@v4
        with:
          name: fdroid-apk
      
      - name: Create F-Droid Release
        uses: softprops/action-gh-release@v2
        with:
          files: momclaw-*-fdroid.apk
          name: "MomClAW ${{ steps.get_version.outputs.VERSION }} (F-Droid)"
          body: |
            ## F-Droid Release
            
            This APK is built without any proprietary dependencies for F-Droid distribution.
            
            **Changes**: See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            
            **Install**:
            1. Download the APK
            2. Enable "Install from unknown sources"
            3. Install the APK
            
            **Verify**: 
            - APK is signed with F-Droid signing key
            - No proprietary dependencies included
            - Source code available at ${{ github.server_url }}/${{ github.repository }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify F-Droid Build
    needs: create-release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "MomClAW F-Droid Build ${{ steps.get_version.outputs.VERSION }}"
          description: |
            F-Droid APK published! 🦝
            
            **Download**: [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }})
            
            **FOSS Compliant**: ✅ No proprietary dependencies
          color: 0x00ff00
          username: "MomClAW F-Droid Bot"
