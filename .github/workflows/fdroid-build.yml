name: F-Droid Build

on:
  push:
    tags:
      - 'v*-fdroid'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Make gradlew executable
      run: chmod +x android/gradlew
    
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%-fdroid}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        fi
    
    - name: Clean build
      run: ./android/gradlew clean
    
    - name: Build unsigned APK
      run: |
        VERSION_CODE=$(echo ${{ steps.get_version.outputs.VERSION }} | tr -d '.')
        sed -i "s/versionCode = .*/versionCode = $VERSION_CODE/" android/app/build.gradle.kts
        sed -i "s/versionName = .*/versionName = \"${{ steps.get_version.outputs.VERSION }}\"/" android/app/build.gradle.kts
        
        ./android/gradlew assembleRelease
    
    - name: Rename APK
      run: |
        mv android/app/build/outputs/apk/release/app-release-unsigned.apk \
           MOMCLAW-${{ steps.get_version.outputs.VERSION }}-fdroid-unsigned.apk
    
    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      run: |
        echo -e "$GPG_PRIVATE_KEY" | gpg --import --batch
    
    - name: Sign with GPG
      run: |
        gpg --armor --detach-sign MOMCLAW-${{ steps.get_version.outputs.VERSION }}-fdroid-unsigned.apk
    
    - name: Generate SHA256 checksum
      run: |
        sha256sum MOMCLAW-${{ steps.get_version.outputs.VERSION }}-fdroid-unsigned.apk > \
                  MOMCLAW-${{ steps.get_version.outputs.VERSION }}-fdroid-unsigned.apk.sha256
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MOMCLAW-fdroid-${{ steps.get_version.outputs.VERSION }}
        path: |
          MOMCLAW-*-fdroid-unsigned.apk
          MOMCLAW-*-fdroid-unsigned.apk.asc
          MOMCLAW-*-fdroid-unsigned.apk.sha256
    
    - name: Create F-Droid metadata
      run: |
        mkdir -p fdroid-metadata
        
        cat > fdroid-metadata/com.loa.MOMCLAW.yml << EOF
        Categories:
          - Productivity
        
        License: Apache-2.0
        
        AuthorName: LinuxOnAsteroids
        AuthorWebSite: https://github.com/serverul
        
        WebSite: https://github.com/serverul/MOMCLAW
        SourceCode: https://github.com/serverul/MOMCLAW
        IssueTracker: https://github.com/serverul/MOMCLAW/issues
        Changelog: https://github.com/serverul/MOMCLAW/blob/main/CHANGELOG.md
        
        AutoName: MOMCLAW
        
        RequiresRoot: false
        
        RepoType: git
        Repo: https://github.com/serverul/MOMCLAW.git
        
        Builds:
          - versionName: '${{ steps.get_version.outputs.VERSION }}'
            versionCode: $(echo ${{ steps.get_version.outputs.VERSION }} | tr -d '.')
            commit: v${{ steps.get_version.outputs.VERSION }}-fdroid
            subdir: android
            gradle:
              - yes
            output: app/build/outputs/apk/release/app-release-unsigned.apk
        
        AutoUpdateMode: Version v%v-fdroid
        UpdateCheckMode: Tags
        CurrentVersion: '${{ steps.get_version.outputs.VERSION }}'
        CurrentVersionCode: $(echo ${{ steps.get_version.outputs.VERSION }} | tr -d '.')
        EOF
        
        echo "F-Droid metadata generated:"
        cat fdroid-metadata/com.loa.MOMCLAW.yml
    
    - name: Notify Success
      if: success()
      run: |
        echo "✅ F-Droid build complete: v${{ steps.get_version.outputs.VERSION }}"
        echo ""
        echo "Next steps:"
        echo "1. Download artifacts from this workflow run"
        echo "2. Submit metadata to fdroiddata repository"
        echo "3. Or upload to self-hosted F-Droid repository"
