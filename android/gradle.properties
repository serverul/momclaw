#   storePassword=YOUR_PASSWORD
#   keyPassword=YOUR_PASSWORD
#   keyAlias=MOMCLAW
#   storeFile=../MOMCLAW-release-key.jks

# Build variant defaults
# For local development, debug builds are faster
# For CI/CD, use release builds for validation

